openapi: 3.0.3
info:
  title: nomad-mvp API
  version: 1.0.0
  description: |
    Core asynchronous workflows with SSE. Latency SLOs are user-perceived:
    ACK (HTTP accept), TTFU (first SSE event), Keep-alive (max gap ≤10s).
servers:
  - url: https://api.example.com
    description: Example server (replace in deployment)
tags:
  - name: Ingest
  - name: Plans
  - name: Export
  - name: SSE
  - name: Auth
  - name: Sessions
  - name: BYOK
  - name: ResultSheet
  - name: Search
  - name: Feedback
  - name: Home
  - name: Library
paths:
  /home/input/parse:
    post:
      tags: [Home]
      summary: Classify unified Home input into ingest, trip params, or unknown
      operationId: parseHomeInput
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeInputParseRequest'
      responses:
        '200':
          description: Input classification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeInputParseResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /library/cities:
    get:
      tags: [Library]
      summary: List user-owned inspiration city aggregates
      operationId: listLibraryCities
      responses:
        '200':
          description: City aggregates for the authenticated user's inspirations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryCitiesResponse'
        '401': { $ref: '#/components/responses/Error401' }
        '500': { $ref: '#/components/responses/Error500' }

  /library/inspirations:
    get:
      tags: [Library]
      summary: List user-owned inspirations for Home and Library
      operationId: listLibraryInspirations
      parameters:
        - in: query
          name: city_id
          schema: { type: string }
        - in: query
          name: locate_status
          schema: { type: string, enum: [resolved, pending] }
      responses:
        '200':
          description: Inspiration list for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryInspirationsResponse'
        '401': { $ref: '#/components/responses/Error401' }
        '500': { $ref: '#/components/responses/Error500' }

  /library/inspirations/{inspiration_id}/candidates:
    get:
      tags: [Library]
      summary: List sanitized pending-location candidates for an inspiration
      operationId: listLibraryCandidates
      parameters:
        - in: path
          name: inspiration_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Top-5 sanitized candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryCandidatesResponse'
        '401': { $ref: '#/components/responses/Error401' }
        '404': { $ref: '#/components/responses/Error404' }
        '500': { $ref: '#/components/responses/Error500' }

  /ingest/start:
    post:
      tags: [Ingest]
      summary: Start ingest of a single Xiaohongshu link (async)
      operationId: startIngest
      deprecated: true
      description: Use POST /ingest/xhs instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestStartRequest'
      responses:
        '202':
          description: Accepted; ingest job created
          headers:
            X-Trace-Id:
              description: Correlation id for tracing
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestStartResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /ingest/xhs:
    post:
      tags: [Ingest]
      summary: Start ingest by Xiaohongshu share link (async)
      operationId: ingestXhs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestXhsRequest'
      responses:
        '202':
          description: Accepted; ingest job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestStartResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /ingest/{job_id}/events:
    get:
      tags: [SSE]
      summary: SSE stream for ingest job events (alias path)
      operationId: ingestEvents
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                example:
                  value: |
                    id: 01J0...
                    event: ingest
                    data: {"trace_id":"t-1","ingest_id":"ing_123","state":"created","retry":0,"ts":1730000000}

                    event: ping
                    data: {"seq":1,"heartbeat_ms":10000,"ts":1730000010}
        '401': { $ref: '#/components/responses/Error401' }
        '404': { $ref: '#/components/responses/Error404' }

  /sse/ingest/{ingest_id}:
    get:
      tags: [SSE]
      summary: SSE stream for ingest job events
      operationId: sseIngest
      deprecated: true
      description: Use GET /ingest/{job_id}/events instead.
      parameters:
        - in: path
          name: ingest_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Server-Sent Events stream
          headers:
            Cache-Control:
              schema: { type: string }
            X-Trace-Id:
              schema: { type: string }
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE lines (id/event/data) where data conforms to IngestEvent schema
              examples:
                example:
                  value: |
                    id: 01J0...
                    event: ingest
                    data: {"trace_id":"t-1","ingest_id":"ing_123","state":"created","retry":0,"ts":1730000000}

                    event: ping
                    data: {"seq":1,"heartbeat_ms":10000,"ts":1730000010}
        '401': { $ref: '#/components/responses/Error401' }
        '404': { $ref: '#/components/responses/Error404' }

  /plan/generate:
    post:
      tags: [Plans]
      summary: Generate day-level skeleton (partial fill) asynchronously
      operationId: planGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanGenerateRequest'
      responses:
        '202':
          description: Accepted; plan job created
          headers:
            X-Trace-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanGenerateResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '409': { $ref: '#/components/responses/Error409' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /sse/plan/{plan_job_id}:
    get:
      tags: [SSE]
      summary: SSE stream for plan generation events
      operationId: ssePlan
      parameters:
        - in: path
          name: plan_job_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Server-Sent Events stream for plan phases
          content:
            text/event-stream:
              schema: { type: string }
              examples:
                example:
                  value: |
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"started","ts":1730000000}
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"freeze","ts":1730000001}
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"selected_anchor","ts":1730000002}
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"quota","ts":1730000003}
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"candidates","ts":1730000004}
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"place","ts":1730000005}
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"validate","ts":1730000006}
                    event: plan
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","phase":"persist","ts":1730000007}
                    event: anchors_ready
                    data: {"trace_id":"t-1","plan_job_id":"pj_1","city":"HZ","season":"autumn","tod":"evening","ready":true}

  /plan/slots/{slot_id}:
    patch:
      tags: [Plans]
      summary: Edit a slot (move/retime/replace/delete) with optimistic locking
      operationId: editSlot
      parameters:
        - in: path
          name: slot_id
          required: true
          schema: { type: string }
        - in: header
          name: If-Match-Rev
          required: true
          schema: { type: integer, format: int32, minimum: 1 }
          description: Current plan revision for optimistic concurrency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotPatchRequest'
      responses:
        '200':
          description: Slot edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotPatchResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '409': { $ref: '#/components/responses/Error409' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /plan/ai-fill:
    post:
      tags: [Plans]
      summary: Start one-shot AI fill over remaining controllable slots (async)
      operationId: aiFill
      deprecated: true
      description: Use POST /fill/apply instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiFillRequest'
      responses:
        '202':
          description: Accepted; fill run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiFillResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /fill/apply:
    post:
      tags: [Plans]
      summary: Apply AI fill over remaining controllable slots (async)
      operationId: fillApply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiFillRequest'
      responses:
        '202':
          description: Accepted; fill run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiFillResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /plan/{plan_id}/result-sheet:
    get:
      tags: [ResultSheet]
      summary: Get read-only result sheet (slots + AI suggestions + citations)
      operationId: getResultSheet
      parameters:
        - in: path
          name: plan_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Result sheet
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResultSheetResponse' }
        '401': { $ref: '#/components/responses/Error401' }
        '404': { $ref: '#/components/responses/Error400' }

  /plan/{plan_id}:
    get:
      tags: [Plans]
      summary: Get plan (alias of result-sheet for convenience)
      operationId: getPlan
      parameters:
        - in: path
          name: plan_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Plan (result-sheet payload)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResultSheetResponse' }
        '401': { $ref: '#/components/responses/Error401' }
        '404': { $ref: '#/components/responses/Error400' }

  /plan/slots/{slot_id}/status:
    patch:
      tags: [Plans]
      summary: Toggle or set slot status (checked)
      operationId: patchSlotStatus
      parameters:
        - in: path
          name: slot_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SlotStatusPatchRequest' }
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlotStatusPatchResponse' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  /plan/slots/{slot_id}/overrides:
    patch:
      tags: [Plans]
      summary: Set or update slot text overrides (do/prepare/notice)
      operationId: patchSlotOverrides
      parameters:
        - in: path
          name: slot_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SlotOverridesPatchRequest' }
      responses:
        '200':
          description: Overrides updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SlotOverridesPatchResponse' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
    delete:
      tags: [Plans]
      summary: Clear slot text overrides (revert to AI)
      operationId: deleteSlotOverrides
      parameters:
        - in: path
          name: slot_id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Cleared }
        '401': { $ref: '#/components/responses/Error401' }

  /sse/fill/{fill_run_id}:
    get:
      tags: [SSE]
      summary: SSE stream for AI fill run
      operationId: sseFill
      parameters:
        - in: path
          name: fill_run_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Server-Sent Events stream for fill phases and result updates
          content:
            text/event-stream:
              schema: { type: string }
              examples:
                example:
                  value: |
                    event: fill
                    data: {"trace_id":"t-1","fill_run_id":"fr_1","state":"started"}
                    event: result_sheet_updated
                    data: {"trace_id":"t-1","plan_id":"pl_1","slot_id":"s_1","source":"override","ts":1730000100}

  /export/png:
    post:
      tags: [Export]
      summary: Export itinerary as PNG/WebP, auto-slicing by day when needed
      operationId: exportPng
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportPngRequest'
      responses:
        '200':
          description: Exported files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportPngResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  # --- Plan Validation & Fix ---
  /plan/validate:
    post:
      tags: [Plans]
      summary: Validate plan feasibility and return conflicts/suggestions
      operationId: planValidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id: { type: string }
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  hard_cnt: { type: integer }
                  soft_cnt: { type: integer }
                  conflicts:
                    type: array
                    items: { $ref: '#/components/schemas/ValidatorConflict' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  /plan/fix:
    post:
      tags: [Plans]
      summary: Apply a suggested fix or atomic ops to reduce conflicts
      operationId: planFix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id: { type: string }
                suggestion_id: { type: string, nullable: true }
                apply_sequence:
                  type: array
                  items: { $ref: '#/components/schemas/FixAtomicOperation' }
      responses:
        '200': { description: Fix applied }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '409': { $ref: '#/components/responses/Error409' }

  # --- HQ background planning ---
  /plan/hq/start:
    post:
      tags: [Plans]
      summary: Start high-quality background planning for a plan
      operationId: hqStart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id: { type: string }
      responses:
        '202':
          description: HQ job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  hq_job_id: { type: string }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  /plan/hq/status:
    get:
      tags: [Plans]
      summary: Get HQ job status
      operationId: hqStatus
      parameters:
        - in: query
          name: hq_job_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: HQ status
          content:
            application/json:
              schema:
                type: object
                properties:
                  state: { type: string, enum: [running, done, failed] }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  /plan/hq/adopt:
    post:
      tags: [Plans]
      summary: Adopt the HQ plan result and merge as current plan
      operationId: hqAdopt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id, hq_job_id]
              properties:
                plan_id: { type: string }
                hq_job_id: { type: string }
      responses:
        '200': { description: Adopted }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  # --- BYOK helpers ---
  /byok/validate:
    post:
      tags: [BYOK]
      summary: Validate a user-provided API key without storing it
      operationId: byokValidate
      security:
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ByokValidateRequest' }
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ByokValidateResponse' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  /byok/save:
    post:
      tags: [BYOK]
      summary: Save BYOK (encrypted) — alias for /user-key
      operationId: byokSave
      security:
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ByokSaveRequest' }
      responses:
        '200':
          description: Saved key status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserKeyStatusResponse' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }


  /search/poi:
    get:
      tags: [Search]
      summary: Text-only POI search (MVP FR44-lite)
      operationId: searchPoi
      parameters:
        - in: query
          name: city
          required: true
          schema: { type: string }
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: topk
          required: false
          schema: { type: integer, default: 5, minimum: 1, maximum: 10 }
      responses:
        '200':
          description: Top‑K results
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SearchPoiItem' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /plans/{plan_id}/candidates:
    post:
      tags: [Plans]
      summary: Manually add a candidate by name/address/coords (MVP minimal)
      operationId: addCandidate
      parameters:
        - in: path
          name: plan_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CandidateAddRequest' }
      responses:
        '200':
          description: Added candidate
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateAddResponse' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  /plan/days/{day}/hotel:
    patch:
      tags: [Plans]
      summary: Set or change hotel for a day (display-only slot)
      operationId: setHotel
      parameters:
        - in: path
          name: day
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetHotelRequest' }
      responses:
        '200': { description: Hotel updated }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }

  # --- Auth & Sessions ---
  /auth/config:
    get:
      tags: [Auth]
      summary: Get login compliance and method configuration
      operationId: authConfig
      responses:
        '200':
          description: Login configuration
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthConfigResponse' }

  /auth/otp/start:
    post:
      tags: [Auth]
      summary: Start OTP flow (SMS)
      operationId: authOtpStart
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpStartRequest' }
      responses:
        '200':
          description: OTP send status or captcha requirement
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OtpStartResponse' }
        '400': { $ref: '#/components/responses/Error400' }
        '403': { $ref: '#/components/responses/Error403' }
        '429':
          $ref: '#/components/responses/Error429'

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and create session
      operationId: authOtpVerify
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpVerifyRequest' }
      responses:
        '200':
          description: Session created
          headers:
            X-Device-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpVerifyResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '429': { $ref: '#/components/responses/Error429' }

  /me:
    get:
      tags: [Sessions]
      summary: Get current user and session
      operationId: me
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Current user and session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401': { $ref: '#/components/responses/Error401' }

  /sessions/me:
    get:
      tags: [Sessions]
      summary: Get current session
      operationId: sessionsMe
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401': { $ref: '#/components/responses/Error401' }

  /sessions:
    get:
      tags: [Sessions]
      summary: List my sessions
      operationId: sessionsList
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401': { $ref: '#/components/responses/Error401' }

  /sessions/{id}:
    delete:
      tags: [Sessions]
      summary: Revoke a session
      operationId: sessionsDelete
      security:
        - SessionAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { $ref: '#/components/responses/Error401' }
        '404': { $ref: '#/components/responses/Error404' }

  /logout:
    post:
      tags: [Sessions]
      summary: Clear current session cookie
      operationId: logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /feedback/link:
    get:
      tags: [Feedback]
      summary: Get feedback product URL (support.qq.com)
      description: Returns the official product URL (https://support.qq.com/product/{PRODUCT_ID}). If product login state is enabled server-side, parameters per official spec may be attached.
      operationId: getFeedbackLink
      security:
        - SessionAuth: []
      parameters:
        - in: query
          name: source
          required: false
          schema: { type: string }
          description: Source page or context for analytics.
      responses:
        '200':
          description: Product URL
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedbackLinkResponse' }
        '401': { $ref: '#/components/responses/Error401' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }

  /account/export:
    post:
      tags: [Account]
      summary: Queue account data export
      operationId: accountExport
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Account export task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountTaskResponse' }
        '401': { $ref: '#/components/responses/Error401' }

  /account:
    delete:
      tags: [Account]
      summary: Queue account deletion
      operationId: accountDelete
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Account deletion task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountTaskResponse' }
        '401': { $ref: '#/components/responses/Error401' }

  /auth/bind/apple:
    post:
      tags: [Auth]
      summary: Bind Apple identity
      operationId: bindApple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token: { type: string }
      responses:
        '200': { description: Bound }
        '401': { $ref: '#/components/responses/Error401' }
  
  /auth/bind/wechat:
    post:
      tags: [Auth]
      summary: Bind WeChat identity
      operationId: bindWeChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200': { description: Bound }
        '401': { $ref: '#/components/responses/Error401' }

  # --- BYOK ---
  /user-key:
    get:
      tags: [BYOK]
      summary: Get masked BYOK status
      operationId: getUserKey
      security:
        - SessionAuth: []
      responses:
        '200':
          description: Key status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserKeyStatusResponse' }
        '401': { $ref: '#/components/responses/Error401' }
    post:
      tags: [BYOK]
      summary: Set or replace BYOK (encrypted and envelope stored)
      operationId: setUserKey
      security:
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ByokSaveRequest' }
      responses:
        '200':
          description: Saved key status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserKeyStatusResponse' }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
    delete:
      tags: [BYOK]
      summary: Delete BYOK
      operationId: deleteUserKey
      security:
        - SessionAuth: []
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Error401' }

components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: cookie
      name: sid
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    FeedbackLinkResponse:
        type: object
        required: [url]
        properties:
          url: { type: string, format: uri }

    AccountTaskResponse:
      type: object
      required: [task_id, status]
      properties:
        task_id: { type: string }
        status: { type: string, enum: [queued, in_progress, done, failed] }

    UserKeyStatusResponse:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }
        provider: { type: string, nullable: true }
        key_ref: { type: string, nullable: true }

    ByokValidateRequest:
      type: object
      required: [key]
      properties:
        key: { type: string, minLength: 1 }

    ByokValidateResponse:
      type: object
      required: [valid]
      properties:
        valid: { type: boolean }
        provider: { type: string, nullable: true }

    ByokSaveRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          minLength: 8
          pattern: '^\S+$'
        provider: { type: string, enum: [openai], nullable: true }

    LoginMethod:
      type: object
      required: [id, label, type, enabled]
      properties:
        id: { type: string, enum: [phone, apple, wechat] }
        label: { type: string }
        type: { type: string, enum: [phone, third_party] }
        provider: { type: string, nullable: true }
        enabled: { type: boolean }

    AuthCaptchaConfig:
      type: object
      required: [provider, mode]
      properties:
        provider: { type: string, enum: [tencent] }
        mode: { type: string, enum: [off, risk, always] }

    AuthConfigResponse:
      type: object
      required: [privacy_url, user_agreement_url, enabled_methods, ios_equal_weight_order, captcha]
      properties:
        privacy_url: { type: string }
        user_agreement_url: { type: string }
        enabled_methods:
          type: array
          items: { $ref: '#/components/schemas/LoginMethod' }
        ios_equal_weight_order:
          type: array
          items: { type: string, enum: [apple, phone, wechat] }
        captcha: { $ref: '#/components/schemas/AuthCaptchaConfig' }

    OtpStartRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, minLength: 6, maxLength: 32, pattern: '^\\+?[0-9][0-9 -]{4,30}[0-9]$' }
        region: { type: string, minLength: 2, maxLength: 8, pattern: '^[A-Z]{2,8}$', default: CN }
        captcha_token: { type: string, minLength: 1, maxLength: 2048, nullable: true }

    OtpStartResponse:
      type: object
      required: [sent, retry_after_sec, captcha_required]
      properties:
        sent: { type: boolean }
        retry_after_sec: { type: integer, minimum: 1 }
        captcha_required: { type: boolean }
        captcha_provider: { type: string, nullable: true, enum: [tencent] }

    OtpVerifyRequest:
      oneOf:
        - type: object
          required: [phone, otp]
          properties:
            phone: { type: string, minLength: 6, maxLength: 32, pattern: '^\\+?[0-9][0-9 -]{4,30}[0-9]$' }
            otp: { type: string, minLength: 4, maxLength: 12 }
            code: { type: string, minLength: 4, maxLength: 12, description: Compatibility alias for otp. If supplied with otp, it must match. }
            device_fingerprint: { type: string, minLength: 1, maxLength: 128 }
            device_id: { type: string, minLength: 1, maxLength: 128, description: Compatibility alias for device_fingerprint. }
        - type: object
          required: [phone, code]
          properties:
            phone: { type: string, minLength: 6, maxLength: 32, pattern: '^\\+?[0-9][0-9 -]{4,30}[0-9]$' }
            otp: { type: string, minLength: 4, maxLength: 12, description: Compatibility alias for code. If supplied with code, it must match. }
            code: { type: string, minLength: 4, maxLength: 12 }
            device_fingerprint: { type: string, minLength: 1, maxLength: 128 }
            device_id: { type: string, minLength: 1, maxLength: 128, description: Compatibility alias for device_fingerprint. }

    Session:
      type: object
      required: [id, device_id, expires_at]
      properties:
        id: { type: string }
        device_id: { type: string }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    SessionResponse:
      type: object
      required: [user, session]
      properties:
        user:
          type: object
          required: [id]
          properties:
            id: { type: string }
            phone: { type: string, nullable: true }
        session: { $ref: '#/components/schemas/Session' }

    CurrentUserResponse:
      type: object
      required: [user_id, user, session]
      properties:
        user_id: { type: string }
        user:
          type: object
          required: [id]
          properties:
            id: { type: string }
            phone: { type: string, nullable: true }
        session: { $ref: '#/components/schemas/Session' }

    OtpVerifyResponse:
      type: object
      required: [user_id, user, session]
      properties:
        user_id: { type: string }
        user:
          type: object
          required: [id]
          properties:
            id: { type: string }
            phone: { type: string, nullable: true }
        session: { $ref: '#/components/schemas/Session' }

    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items: { $ref: '#/components/schemas/Session' }

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
    ErrorEnvelope:
      type: object
      required: [error_code, error_message]
      properties:
        error_code: { type: string, example: INGEST_TIMEOUT }
        error_message: { type: string }
        retriable: { type: boolean }
        details: { type: object, additionalProperties: true }

    HomeInputParseRequest:
      type: object
      required: [text]
      properties:
        text: { type: string, minLength: 1, maxLength: 2000 }

    HomeTripParams:
      type: object
      required: [city]
      properties:
        city: { type: string }
        start_date: { type: string, format: date, nullable: true }
        days: { type: integer, minimum: 1, nullable: true }
        pace: { type: string, enum: [tight, comfortable], nullable: true }

    PlannerHandoffSelectedItem:
      type: object
      required: [item_id]
      properties:
        item_id: { type: string }
        poi_id: { type: string, nullable: true }
        source: { type: string, enum: [library, home_card, home_input, uploaded_inspiration], nullable: true }
        anchor_intent: { type: string, enum: [selected_required], nullable: true, description: Internal semantic for user-selected L3 planning anchors. Do not expose as must-go UI. }
        time_hint:
          nullable: true
          $ref: '#/components/schemas/PlannerTimeHint'
        stay_minutes_hint: { type: integer, minimum: 0, nullable: true }

    PlannerHandoff:
      type: object
      required: [route, source, selected_items]
      properties:
        route: { type: string, example: '/planner/pick?city=杭州&source=home_input' }
        source: { type: string, enum: [home_input, home_card] }
        selected_items:
          type: array
          items:
            $ref: '#/components/schemas/PlannerHandoffSelectedItem'

    HomeInputParseResponse:
      type: object
      required: [type, original_text]
      properties:
        type: { type: string, enum: [xhs_link, trip_params, unknown] }
        original_text: { type: string }
        url: { type: string, format: uri, nullable: true }
        warning:
          nullable: true
          $ref: '#/components/schemas/IngestWarning'
        trip_params:
          nullable: true
          $ref: '#/components/schemas/HomeTripParams'
        planner_handoff:
          nullable: true
          $ref: '#/components/schemas/PlannerHandoff'

    LibraryCitySummary:
      type: object
      required: [city_id, name, inspiration_count, pending_count]
      properties:
        city_id: { type: string }
        name: { type: string }
        inspiration_count: { type: integer, minimum: 0 }
        pending_count: { type: integer, minimum: 0 }

    LibraryCitiesResponse:
      type: object
      required: [cities, unlocated_count]
      properties:
        cities:
          type: array
          items:
            $ref: '#/components/schemas/LibraryCitySummary'
        unlocated_count: { type: integer, minimum: 0 }

    LibraryInspirationItem:
      type: object
      required: [id, title, summary, locate_status, city_id, city_name, poi_id, poi_name, poi_address, asset_count, candidate_count, created_at]
      properties:
        id: { type: string }
        title: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        locate_status: { type: string, enum: [resolved, pending] }
        city_id: { type: string, nullable: true }
        city_name: { type: string, nullable: true }
        poi_id: { type: string, nullable: true }
        poi_name: { type: string, nullable: true }
        poi_address: { type: string, nullable: true }
        asset_count: { type: integer, minimum: 0 }
        candidate_count: { type: integer, minimum: 0 }
        created_at: { type: string, format: date-time }

    LibraryInspirationsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LibraryInspirationItem'

    LibraryCandidate:
      type: object
      required: [candidate_id, name, address]
      properties:
        candidate_id: { type: string }
        name: { type: string }
        address: { type: string }

    LibraryCandidatesResponse:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/LibraryCandidate'

    PlannerTimeHint:
      type: string
      enum: [dawn, morning, afternoon, sunset, evening, night, night_market]

    PlannerAnchorSource:
      type: string
      enum: [library, home_card, home_input, uploaded_inspiration]

    PlannerSelectedItem:
      type: object
      required: [item_id, source]
      properties:
        item_id: { type: string }
        poi_id: { type: string, nullable: true }
        source:
          $ref: '#/components/schemas/PlannerAnchorSource'
        anchor_intent:
          type: string
          enum: [selected_required]
          default: selected_required
          description: Internal semantic for user-selected L3 anchors. UI should only show selected state.
        time_hint:
          nullable: true
          $ref: '#/components/schemas/PlannerTimeHint'
        stay_minutes_hint: { type: integer, minimum: 0, nullable: true }

    PlannerCandidateItem:
      type: object
      required: [item_id, source]
      properties:
        item_id: { type: string }
        poi_id: { type: string, nullable: true }
        source:
          $ref: '#/components/schemas/PlannerAnchorSource'
        time_hint:
          nullable: true
          $ref: '#/components/schemas/PlannerTimeHint'
        stay_minutes_hint: { type: integer, minimum: 0, nullable: true }

    PlanHotelConstraint:
      type: object
      required: [date]
      properties:
        date: { type: string, format: date }
        hotel_name: { type: string, nullable: true }
        poi_id: { type: string, nullable: true, description: AMap POI id when matched. }
        address: { type: string, nullable: true }
        breakfast_included: { type: boolean, default: false }
        leave_blank: { type: boolean, default: false }

    PlanLuggagePlan:
      type: object
      properties:
        mode: { type: string, enum: [carry_with_me, hotel_storage, station_storage, courier, undecided], default: undecided }
        notes: { type: string, maxLength: 500, nullable: true }
        hotel_change_help_needed: { type: boolean, default: false }

    PlanHardTimeHint:
      type: object
      required: [item_id, time_hint, source]
      properties:
        item_id: { type: string }
        poi_id: { type: string, nullable: true }
        time_hint:
          $ref: '#/components/schemas/PlannerTimeHint'
        source: { type: string, enum: [uploaded_inspiration, user_selected] }

    IngestStartRequest:
      type: object
      required: [source]
      properties:
        source: { type: string, enum: [xhs] }
        share_text: { type: string, nullable: true }
        url: { type: string, format: uri, nullable: true }
        force: { type: boolean, description: 'Bypass idempotency (admin/feature-flag)' }

    IngestStartResponse:
      type: object
      required: [ingest_id, state, sse_url]
      properties:
        ingest_id: { type: string }
        state: { type: string, enum: [created] }
        sse_url: { type: string, example: '/ingest/ing_123/events' }
        warning:
          $ref: '#/components/schemas/IngestWarning'

    IngestWarning:
      type: object
      required: [code, message, extra_count]
      properties:
        code: { type: string, enum: [INGEST_SINGLE_LINK_ONLY] }
        message: { type: string, example: '一次仅处理一条链接，其余请逐条粘贴' }
        extra_count: { type: integer, minimum: 1 }

    IngestXhsRequest:
      type: object
      description: Provide either url or share_text containing a Xiaohongshu URL.
      anyOf:
        - required: [url]
        - required: [share_text]
      properties:
        url: { type: string, format: uri, nullable: true }
        share_text: { type: string, nullable: true }

    IngestEvent:
      type: object
      required: [trace_id, ingest_id, state, ts]
      properties:
        trace_id: { type: string }
        ingest_id: { type: string }
        state: { type: string, enum: [created, fetching, parsing, geo, storing, done, failed] }
        sub_stage: { type: string, enum: [text, ocr, vision], nullable: true }
        retry: { type: integer, minimum: 0 }
        fetched_count: { type: integer, minimum: 0 }
        parsed_count: { type: integer, minimum: 0 }
        candidate_count: { type: integer, minimum: 0 }
        stored_count: { type: integer, minimum: 0 }
        error_code: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        retriable: { type: boolean, nullable: true }
        ts: { type: integer }

    PlanGenerateRequest:
      type: object
      required: [city, start_date, days, pace]
      properties:
        city: { type: string }
        start_date: { type: string, format: date }
        days: { type: integer, minimum: 1 }
        pace: { type: string, enum: [tight, comfortable] }
        source: { type: string, enum: [home_input, home_card], nullable: true }
        rec_id: { type: string, nullable: true }
        selected_items:
          type: array
          items:
            $ref: '#/components/schemas/PlannerSelectedItem'
        candidate_items:
          type: array
          items:
            $ref: '#/components/schemas/PlannerCandidateItem'
        hotels:
          type: array
          items:
            $ref: '#/components/schemas/PlanHotelConstraint'
        luggage_plan:
          $ref: '#/components/schemas/PlanLuggagePlan'
        wake_preference: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$', nullable: true }
        morning_start_time: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$', nullable: true }
        first_day_arrival_time: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$', nullable: true }
        last_day_departure_time: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$', nullable: true }
        smart_planning: { type: boolean, default: true }
        hard_time_hints:
          type: array
          items:
            $ref: '#/components/schemas/PlanHardTimeHint'

    PlanGenerateResponse:
      type: object
      required: [plan_id, plan_job_id]
      properties:
        plan_id: { type: string }
        plan_job_id: { type: string }
        sse_url: { type: string, example: '/sse/plan/pj_1' }

    SlotPatchRequest:
      type: object
      required: [op]
      properties:
        op: { type: string, enum: [move, retime, replace, delete] }
        new_day: { type: integer, minimum: 1 }
        new_start: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$' }
        new_end: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$' }
        replace_with_poi_id: { type: string }

    SlotPatchResponse:
      type: object
      required: [undo_token, plan_rev]
      properties:
        undo_token: { type: string }
        plan_rev: { type: integer, minimum: 1 }

    AiFillRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id: { type: string }
        dry_run: { type: boolean, default: false }

    AiFillResponse:
      type: object
      required: [fill_run_id]
      properties:
        fill_run_id: { type: string }
        sse_url: { type: string, example: '/sse/fill/fr_1' }

    ExportPngRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id: { type: string }
        width_px: { type: integer, enum: [1080, 1242], default: 1080 }
        slice_by_day: { type: boolean, default: true }
        theme: { type: string, enum: [light, dark], default: light }

    ExportPngResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: object
            required: [url]
            properties:
              day: { type: integer, minimum: 1, nullable: true }
              url: { type: string, format: uri }
        format: { type: string, enum: [webp, jpeg] }
        fallback_reason: { type: string, nullable: true }

    SlotRecommendation:
      type: object
      properties:
        do: { type: string, nullable: true }
        prepare: { type: string, nullable: true }
        notice: { type: string, nullable: true }
        source: { type: string, enum: [ai, override], default: ai }

    ResultSheetResponse:
      type: object
      required: [plan_id, days]
      properties:
        plan_id: { type: string }
        days:
          type: array
          items:
            type: object
            required: [day, slots]
            properties:
              day: { type: integer, minimum: 1 }
              hotel:
                type: object
                nullable: true
                properties:
                  name: { type: string }
                  address: { type: string }
                  map_url: { type: string, nullable: true }
              slots:
                type: array
                items:
                  type: object
                  required: [slot_id, type, start, end, title]
                  properties:
                    slot_id: { type: string }
                    type: { type: string, enum: [activity, dining, nightlife, transport, hotel] }
                    start: { type: string }
                    end: { type: string }
                    title: { type: string }
                    checked: { type: boolean }
                    why_short: { type: string, nullable: true }
                    citations: { type: array, items: { type: string }, nullable: true }
                    recommendation:
                      $ref: '#/components/schemas/SlotRecommendation'

    SlotStatusPatchRequest:
      type: object
      properties:
        checked: { type: boolean }

    SlotStatusPatchResponse:
      type: object
      required: [slot_id, checked]
      properties:
        slot_id: { type: string }
        checked: { type: boolean }

    SlotOverridesPatchRequest:
      type: object
      properties:
        do:
          type: string
          maxLength: 90
          nullable: true
          description: Plain text only; no markup/HTML
          pattern: "^[^<>]*$"
        prepare:
          type: string
          maxLength: 90
          nullable: true
          description: Plain text only; no markup/HTML
          pattern: "^[^<>]*$"
        notice:
          type: string
          maxLength: 90
          nullable: true
          description: Plain text only; no markup/HTML
          pattern: "^[^<>]*$"
      additionalProperties: false

    SlotOverridesPatchResponse:
      type: object
      required: [slot_id]
      properties:
        slot_id: { type: string }
        recommendation:
          $ref: '#/components/schemas/SlotRecommendation'

    SearchPoiItem:
      type: object
      required: [poi_id, name, address]
      properties:
        poi_id: { type: string }
        name: { type: string }
        address: { type: string }
        distance_m: { type: integer, nullable: true }

    CandidateAddRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        address: { type: string, nullable: true }
        lat: { type: number, format: double, nullable: true }
        lng: { type: number, format: double, nullable: true }

    CandidateAddResponse:
      type: object
      required: [candidate_id]
      properties:
        candidate_id: { type: string }

    SetHotelRequest:
      type: object
      required: [plan_id, hotel_poi_id]
      properties:
        plan_id: { type: string }
        hotel_poi_id: { type: string }

    # --- Validator & Fix (descriptive schemas; no new endpoints required) ---
    ValidatorConflictType:
      type: string
      description: Feasibility conflict type detected by Validator
      enum: [no_coords, closed, cross_day_unreachable, too_far, overtime, open_gap_short, transport_boundary, hotel_boundary]

    ConflictSeverity:
      type: string
      enum: [hard, soft]

    ValidatorConflict:
      type: object
      description: A single conflict with optional fix suggestions
      required: [type, severity]
      properties:
        type: { $ref: '#/components/schemas/ValidatorConflictType' }
        severity: { $ref: '#/components/schemas/ConflictSeverity' }
        day: { type: integer, nullable: true }
        slot_id: { type: string, nullable: true }
        details:
          type: object
          additionalProperties: true
        suggestions:
          type: array
          items: { $ref: '#/components/schemas/FixSuggestion' }
      example:
        type: too_far
        severity: soft
        day: 2
        slot_id: s_abc
        details:
          commute_minutes: 28
          limit_minutes: 18
        suggestions:
          - id: fix_1
            conflict_type: too_far
            safe: true
            requires_user_input: false
            score: 0.87
            actions:
              - type: reorder
                notes: "Swap with previous slot to reduce commute"
            apply_sequence:
              - op: move
                slot_id: s_abc
                new_day: 2
                new_start: "14:00"
                new_end: "16:00"
              - op: move
                slot_id: s_prev
                new_day: 2
                new_start: "16:00"
                new_end: "18:00"
          - id: fix_2
            conflict_type: too_far
            safe: true
            requires_user_input: true
            score: 0.81
            actions:
              - type: replace_with_alternative
                notes: "Use nearer candidate"
            apply_sequence:
              - op: replace
                slot_id: s_abc
                replace_with_poi_id: poi_nearby_1

    FixActionType:
      type: string
      description: High-level fix strategy
      enum: [reorder, move, retime, shorten_stay, replace_with_alternative, shift_day, align_to_boundary, suggest_insert_candidate]

    FixAction:
      type: object
      required: [type]
      properties:
        type: { $ref: '#/components/schemas/FixActionType' }
        notes: { type: string, nullable: true }

    FixAtomicOperation:
      type: object
      description: |
        Atomic operations map to existing APIs:
        - move/retime/replace/delete → PATCH /plan/slots/{slot_id}
        - set_hotel → PATCH /plan/days/{day}/hotel
      required: [op]
      properties:
        op:
          type: string
          enum: [move, retime, replace, delete, set_hotel]
        slot_id: { type: string, nullable: true }
        day: { type: integer, nullable: true }
        new_day: { type: integer, nullable: true }
        new_start: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$', nullable: true }
        new_end: { type: string, pattern: '^[0-2][0-9]:[0-5][0-9]$', nullable: true }
        replace_with_poi_id: { type: string, nullable: true }
        hotel_poi_id: { type: string, nullable: true }

    FixSuggestion:
      type: object
      required: [id, conflict_type, actions]
      properties:
        id: { type: string }
        conflict_type: { $ref: '#/components/schemas/ValidatorConflictType' }
        safe: { type: boolean, description: 'Does not modify frozen selected anchors or time hints' }
        requires_user_input: { type: boolean, description: 'Needs user to pick an alternative or candidate' }
        score: { type: number, format: double, description: 'Higher is better; deterministic tie-break' }
        actions:
          type: array
          items: { $ref: '#/components/schemas/FixAction' }
        apply_sequence:
          type: array
          description: Ordered atomic ops to apply using existing endpoints
          items: { $ref: '#/components/schemas/FixAtomicOperation' }
      example:
        id: fix_1
        conflict_type: too_far
        safe: true
        requires_user_input: false
        score: 0.87
        actions:
          - type: reorder
            notes: "Swap with previous slot to reduce commute"
        apply_sequence:
          - op: move
            slot_id: s_abc
            new_day: 2
            new_start: "14:00"
            new_end: "16:00"

  responses:
    Error400:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Error403:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Error404:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Error409:
      description: Conflict (Optimistic locking / idempotency)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Error429:
      description: Too Many Requests (rate limited)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Error500:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }


